# Render Blueprint - Deploys both backend services
# See: https://docs.render.com/infrastructure-as-code

services:
  # ===== Main Backend API =====
  - type: web
    name: edusphere-backend
    runtime: node
    region: singapore  # Closest to India
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false  # Set manually in Render dashboard
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        sync: false  # Set to your Vercel frontend URL after deploying

  # ===== Chatbot Backend =====
  - type: web
    name: edusphere-chatbot
    runtime: node
    region: singapore
    plan: free
    rootDir: chatbot-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        sync: false  # Set to your Vercel frontend URL after deploying
      - key: GROQ_API_KEY
        sync: false  # Set manually in Render dashboard
